# Grype ignore rules for the CI dependency gate (see the org decision memo
# audits/grype_vs_pip-audit_decision_memo_2026-06-10.md). Every entry needs a
# reason and a revisit condition — this file is the reviewable record of
# accepted risk. Fixable findings are bumped in [tool.pixi.dependencies], not
# ignored here.

ignore:
  # CPython advisories fixed upstream but with no installable conda-forge patch
  # in the current 3.x line yet. Remove entries as conda-forge ships newer
  # patch releases (the lockfile-update workflow will pick them up).
  - vulnerability: CVE-2025-12781
    package:
      name: python
  - vulnerability: CVE-2025-15366
    package:
      name: python
  - vulnerability: CVE-2025-15367
    package:
      name: python
  - vulnerability: CVE-2026-3276
    package:
      name: python
  - vulnerability: CVE-2026-7210
    package:
      name: python
  - vulnerability: CVE-2026-7774
    package:
      name: python

  # pyo3 0.28.x is statically linked into the rpds-py wheel (transitive); grype
  # catalogs it from the compiled binary, but it is not fixable from this repo —
  # it needs an upstream conda-forge rebuild of rpds-py against pyo3 >= 0.29.0.
  # The same advisories were fixed directly in the group's own Rust repos
  # (NEREIDS/bm3dornl).
  - vulnerability: GHSA-36hh-v3qg-5jq4 # HIGH: pyo3 OOB read in nth/nth_back for PyList/PyTuple
    package:
      name: pyo3
  - vulnerability: GHSA-chgr-c6px-7xpp # MEDIUM: pyo3 missing Sync bound on PyCFunction::new_closure
    package:
      name: pyo3
